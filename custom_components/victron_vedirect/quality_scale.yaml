rules:
  # --- Bronze -------------------------------------------------------------
  action-setup:
    status: exempt
    comment: Integration registers no services.
  appropriate-polling: done
  brands:
    status: todo
    comment: PR to home-assistant/brands pending.
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: todo
  dependency-transparency: done
  docs-actions:
    status: exempt
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities are coordinator-driven; no external event subscriptions.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # --- Silver -------------------------------------------------------------
  action-exceptions:
    status: exempt
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Local serial — no authentication.
  test-coverage:
    status: todo

  # --- Gold ---------------------------------------------------------------
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
  discovery:
    status: todo
    comment: USB discovery via the usb integration is a future enhancement.
  docs-data-update: done
  docs-examples:
    status: todo
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting:
    status: todo
  docs-use-cases: done
  dynamic-devices:
    status: exempt
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
  stale-devices:
    status: exempt

  # --- Platinum -----------------------------------------------------------
  async-dependency: todo
  inject-websession:
    status: exempt
  strict-typing: todo
